name: muzzle_id
description: Cattle Biometric Data Collection App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Machine Learning
  tflite_flutter: ^0.12.0

  # Camera
  camera: ^0.11.0

  # Firebase
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Offline Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
